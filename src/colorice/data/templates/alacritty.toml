# colorice theme — generated from {wallpaper}
# Usage: add `import = ["~/.config/alacritty/colorice-theme.toml"]` to alacritty.toml

[colors.primary]
background = "{background}"
foreground = "{foreground}"

[colors.cursor]
cursor = "{cursor}"
text   = "{background}"

[colors.selection]
background = "{color8}"
text       = "{foreground}"

[colors.normal]
black   = "{color0}"
red     = "{color1}"
green   = "{color2}"
yellow  = "{color3}"
blue    = "{color4}"
magenta = "{color5}"
cyan    = "{color6}"
white   = "{color7}"

[colors.bright]
black   = "{color8}"
red     = "{color9}"
green   = "{color10}"
yellow  = "{color11}"
blue    = "{color12}"
magenta = "{color13}"
cyan    = "{color14}"
white   = "{color15}"
