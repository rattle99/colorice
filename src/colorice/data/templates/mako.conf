# colorice theme — generated from {wallpaper}
# Usage: add `include=/path/to/colorice-mako.conf` to ~/.config/mako/config
# or copy the color values directly into your mako config.

background-color={background}ff
text-color={foreground}ff
border-color={color4}ff

[urgency=low]
background-color={background}ff
text-color={color8}ff
border-color={color8}ff

[urgency=normal]
background-color={background}ff
text-color={foreground}ff
border-color={color4}ff

[urgency=high]
background-color={color1}ff
text-color={color7}ff
border-color={color9}ff
