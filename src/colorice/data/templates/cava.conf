# colorice theme — generated from {wallpaper}
# Usage: copy to ~/.config/cava/config or source from your cava config
# Only the [color] section is managed by colorice

[color]
background = '{background}'
foreground = '{foreground}'

gradient = 1
gradient_count = 8
gradient_color_1 = '{color1}'
gradient_color_2 = '{color2}'
gradient_color_3 = '{color3}'
gradient_color_4 = '{color4}'
gradient_color_5 = '{color5}'
gradient_color_6 = '{color6}'
gradient_color_7 = '{color7}'
gradient_color_8 = '{foreground}'
