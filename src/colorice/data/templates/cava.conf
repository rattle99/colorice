# colorice theme — generated from {wallpaper}

[general]
mode = normal
framerate = 60
autosens = 1
sensitivity = 120
bars = 0
lower_cutoff_freq = 50
higher_cutoff_freq = 12000

[input]
method = pulse
source = auto

[output]
method = noncurses
channels = stereo
mono_option = average
bar_width = 1
bar_spacing = 0

[smoothing]
noise_reduction = 65

[eq]
1 = 1.2
2 = 1.1
3 = 1.0
4 = 0.9
5 = 0.8

[color]
background = '{background}'
foreground = '{foreground}'

gradient = 1
gradient_count = 8
gradient_color_1 = '{color1}'
gradient_color_2 = '{color2}'
gradient_color_3 = '{color3}'
gradient_color_4 = '{color4}'
gradient_color_5 = '{color5}'
gradient_color_6 = '{color6}'
gradient_color_7 = '{color7}'
gradient_color_8 = '{foreground}'
