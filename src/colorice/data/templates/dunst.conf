# colorice theme — generated from {wallpaper}
#
# Usage: dunst supports loading multiple config files — later files override
# earlier ones for matching keys. Set your hook in config.toml to:
#
#   hook = "pkill dunst; dunst -config ~/.config/dunst/dunstrc -config ~/.config/dunst/colorice-colors.conf &"
#
# Your dunstrc keeps fonts, geometry, timeouts etc. This file only overrides colors.
# Alternatively, copy the sections below manually into your dunstrc.

[urgency_low]
    background  = "{background}"
    foreground  = "{color8}"
    frame_color = "{color8}"

[urgency_normal]
    background  = "{background}"
    foreground  = "{foreground}"
    frame_color = "{color4}"

[urgency_critical]
    background  = "{color1}"
    foreground  = "{color7}"
    frame_color = "{color9}"
