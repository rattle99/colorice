# colorice theme — generated from {wallpaper}
# This file is managed by colorice. Edit the template, not this file.
# Template: ~/.config/colorice/templates/dunst.conf

[global]
    monitor = 0
    follow = mouse
    width = 350
    height = 300
    origin = top-right
    offset = 20x20
    notification_limit = 5
    progress_bar = true

    # Appearance
    frame_width = 2
    frame_color = "{color4}"
    separator_height = 2
    separator_color = frame
    corner_radius = 8
    gap_size = 5
    padding = 12
    horizontal_padding = 15
    text_icon_padding = 15

    # Font
    font = JetBrainsMono Nerd Font 10

    # Behavior
    sort = yes
    idle_threshold = 120
    show_age_threshold = 60
    markup = full
    format = "<b>%s</b>\n%b"
    alignment = left
    vertical_alignment = center
    show_indicators = yes
    word_wrap = yes
    icon_position = left
    max_icon_size = 48

    # History
    sticky_history = yes
    history_length = 20

    # Mouse actions
    mouse_left_click = close_current
    mouse_middle_click = do_action, close_current
    mouse_right_click = close_all

[urgency_low]
    background  = "{background}"
    foreground  = "{color8}"
    frame_color = "{color8}"
    timeout = 5

[urgency_normal]
    background  = "{background}"
    foreground  = "{foreground}"
    frame_color = "{color4}"
    timeout = 10

[urgency_critical]
    background  = "{color1}"
    foreground  = "{color7}"
    frame_color = "{color9}"
    timeout = 0

[battery_warning]
    appname = battery-monitor
    summary = "Battery Low"
    urgency = normal
    frame_color = "{color4}"
    timeout = 10

[battery_critical]
    appname = battery-monitor
    summary = "Battery Critical"
    urgency = critical
    timeout = 0
