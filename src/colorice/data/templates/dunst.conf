# colorice theme — generated from {wallpaper}
# Usage: include this in your dunst/dunstrc under [urgency_*] sections,
# or reference these colors directly. Restart dunst after applying.

[colorice]
    # Primary colors
    background  = "{background}"
    foreground  = "{foreground}"
    highlight   = "{cursor}"

    # Low urgency
    low_background  = "{background}"
    low_foreground  = "{color8}"
    low_frame_color = "{color8}"

    # Normal urgency
    normal_background  = "{background}"
    normal_foreground  = "{foreground}"
    normal_frame_color = "{color4}"

    # Critical urgency
    critical_background  = "{color1}"
    critical_foreground  = "{color7}"
    critical_frame_color = "{color9}"
